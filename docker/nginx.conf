# =============================================================================
# TicketInsight Pro — Nginx Reverse Proxy Configuration
# =============================================================================
# Provides:
#   - Reverse proxy to app:5000
#   - WebSocket support for Metabase on /metabase/
#   - Gzip compression
#   - Static file caching
#   - Security headers
#   - 50MB max client body size
#
# Usage:
#   nginx -c /etc/nginx/nginx.conf
#   or mount into docker-compose as a service
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream definitions
# ---------------------------------------------------------------------------
upstream ticketinsight_app {
    server app:5000;
}

upstream metabase_app {
    server metabase:3000;
}

# ---------------------------------------------------------------------------
# HTTP server
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # --- Client limits ---
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.api+json
        image/svg+xml
        application/x-javascript
        font/woff
        font/woff2;

    # --- Logging ---
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # --- Metabase proxy (WebSocket support) ---
    location /metabase/ {
        proxy_pass http://metabase_app/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # --- Static files (direct serve with caching) ---
    location /static/ {
        alias /app/web/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- API endpoints (no caching for dynamic content) ---
    location /api/ {
        proxy_pass http://ticketinsight_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires -1;
    }

    # --- Default: proxy all other requests to the app ---
    location / {
        proxy_pass http://ticketinsight_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffering settings for large responses
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # --- Health check endpoint (skip logging) ---
    location = /api/v1/health {
        proxy_pass http://ticketinsight_app;
        access_log off;
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        default_type text/html;
    }
}
